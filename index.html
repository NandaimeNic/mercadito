<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercadito Nandaime</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f2f2f2;
}

header{
  background:#128C7E;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:22px;
}

.sub{
  text-align:center;
  padding:8px;
  font-size:14px;
}

.container{
  padding:10px;
  max-width:700px;
  margin:auto;
}

.card{
  background:white;
  margin-bottom:12px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{
  padding:10px;
}

.price{
  color:green;
  font-weight:bold;
  margin-top:5px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.whatsapp{
  background:#25D366;
  color:white;
}

.publish{
  background:#ff9800;
  color:white;
  font-weight:bold;
}

.form-box{
  display:none;
  background:white;
  padding:12px;
  border-radius:10px;
  margin:12px 0;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  box-sizing:border-box;
}

.small{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<header>Mercadito Nandaime</header>

<div class="sub">
Publica por $0.85 • Activo 5 días
</div>

<div class="container">

<button class="publish" onclick="toggleForm()">📩 Publicar anuncio</button>

<div class="form-box" id="formBox">

<input id="title" placeholder="Título del anuncio">
<input id="price" placeholder="Precio">

<select id="category">
<option value="products">Productos</option>
<option value="services">Servicios</option>
<option value="restaurants">Restaurantes</option>
</select>

<textarea id="desc" placeholder="Descripción"></textarea>

<input id="phone" placeholder="WhatsApp (+505...)">

<div class="small">
Después del pago tu anuncio se publicará automáticamente.
</div>

<button class="publish" onclick="startPayment()">Publicar ($0.85)</button>

</div>

<h3>🛍️ Publicaciones</h3>

<div id="listings">
<p>Cargando...</p>
</div>

</div>

<script src="main.js?v=2"></script>

</body>
</html>
