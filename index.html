<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mercadito Nandaime</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #25D366;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    .section {
      padding: 10px;
    }
    .card {
      background: white;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .featured {
      border: 2px solid gold;
    }
    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .content {
      padding: 10px;
    }
    .price {
      color: green;
      font-weight: bold;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    .whatsapp {
      background: #25D366;
      color: white;
    }
    .feature-btn {
      background: orange;
      color: white;
    }
  </style>
</head>
<body>

<header>Mercadito Nandaime</header>

<div class="section">
  <h3>⭐ Destacados</h3>

  <div class="card featured">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <div class="content">
      <div>Venta de zapatos nuevos</div>
      <div class="price">C$800</div>
      <button class="whatsapp" onclick="contactSeller()">Contactar por WhatsApp</button>
    </div>
  </div>

</div>

<div class="section">
  <h3>🛍️ Últimos</h3>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1593032465171-8f0c3b6a9d38">
    <div class="content">
      <div>Servicio de uñas</div>
      <div class="price">C$300</div>
      <button class="whatsapp" onclick="contactSeller()">Contactar por WhatsApp</button>
      <button class="feature-btn" onclick="feature()">⭐ Destacar publicación</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1585238342028-4c0e9f4b3c35">
    <div class="content">
      <div>Venta de ropa</div>
      <div class="price">C$500</div>
      <button class="whatsapp" onclick="contactSeller()">Contactar por WhatsApp</button>
      <button class="feature-btn" onclick="feature()">⭐ Destacar publicación</button>
    </div>
  </div>

</div>

<script>
function contactSeller() {
  window.open("https://wa.me/50558365522?text=Hola,%20vi%20tu%20publicación%20en%20Mercadito%20Nandaime", "_blank");
}

function feature() {
  window.open("https://wa.me/50558365522?text=Hola,%20quiero%20destacar%20mi%20publicación%20en%20Mercadito%20Nandaime", "_blank");
}
</script>

</body>
</html>
