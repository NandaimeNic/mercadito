<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercadito Nandaime</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #128C7E;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.sub {
  text-align:center;
  padding:8px;
  font-size:14px;
}

.container {
  padding:10px;
}

.card {
  background:white;
  margin-bottom:10px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.content {
  padding:10px;
}

.price {
  color:green;
  font-weight:bold;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:5px;
}

.whatsapp {
  background:#25D366;
  color:white;
}

.publish {
  background:#ff9800;
  color:white;
  font-weight:bold;
}

.section-title {
  margin:10px 0;
  font-weight:bold;
}

.form-box {
  display:none;
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select, textarea {
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>Mercadito Nandaime</header>

<div class="sub">
Solo en Nandaime • Publica por $0.85 (5 días)
</div>

<div class="container">

<button class="publish" onclick="toggleForm()">📩 Publicar anuncio</button>

<div class="form-box" id="formBox">
  <input id="title" placeholder="Título">
  <input id="price" placeholder="Precio">
  <select id="category">
    <option>Productos</option>
    <option>Servicios</option>
    <option>Comida</option>
  </select>
  <textarea id="desc" placeholder="Descripción"></textarea>
  <input id="phone" placeholder="WhatsApp (+505...)">

  <button onclick="submitAd()">Publicar ($0.85)</button>
</div>

<div id="paymentBox" style="display:none; background:white; padding:10px; border-radius:10px;">
  <p>Para activar tu anuncio paga aquí:</p>
  <button onclick="pay()">Pagar con tarjeta</button>
  <p>Luego envía comprobante por WhatsApp</p>
</div>

<h3 class="section-title">🛍️ Publicaciones</h3>

<div class="card">
  <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
  <div class="content">
    <div>Zapatos deportivos</div>
    <div class="price">C$900</div>
    <button class="whatsapp" onclick="contact()">Contactar</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1556228453-efd6c1ff04f6">
  <div class="content">
    <div>Servicio de uñas</div>
    <div class="price">C$300</div>
    <button class="whatsapp" onclick="contact()">Contactar</button>
  </div>
</div>

</div>

<script>
function toggleForm(){
  document.getElementById("formBox").style.display = "block";
}

function submitAd(){
  document.getElementById("paymentBox").style.display = "block";
}

function pay(){
  window.open("https://checkout.revolut.com/pay/d551a8af-84fb-4f33-8f53-73160994575e","_blank");
}

function contact(){
  window.open("https://wa.me/50558365522?text=Hola,%20vi%20tu%20publicación%20en%20Mercadito%20Nandaime","_blank");
}
</script>

</body>
</html>
