<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mercadito Nandaime</title>

<link rel="stylesheet" href="style.css?v=6">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="main.js?v=6" defer></script>

</head>

<body>

<header>Mercadito Nandaime</header>

<div class="sub">
Compra y vende en Nandaime
</div>

<div class="container">

<!-- AUTH -->
<div style="display:flex; gap:10px; margin-bottom:15px;">
  <button onclick="toggleAuthUI()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<button class="publish" onclick="toggleForm()">Publicar anuncio</button>

<div class="search-box">
  <input placeholder="¿Qué buscas en Nandaime?">
  <button>Buscar</button>
</div>

<!-- FORM -->
<div class="form-box" id="formBox" style="display:none;">

<input id="title" placeholder="Título">
<input id="price" placeholder="Precio">

<select id="category">
<option value="ropa">Ropa</option>
<option value="electronica">Electrónica</option>
<option value="reparaciones">Reparaciones</option>
<option value="hogar">Hogar</option>
<option value="vehiculos">Vehículos</option>
<option value="comida">Comida</option>
<option value="servicios">Servicios</option>
<option value="otros">Otros</option>
</select>

<textarea id="desc" placeholder="Descripción"></textarea>

<input type="file" id="imageInput" accept="image/*">
<input id="phone" placeholder="WhatsApp (+505...)">

<button class="publish" onclick="startPost()">Publicar</button>

</div>

<!-- LISTINGS -->
<div id="listings"></div>

</div>

<!-- AUTH MODAL -->
<div id="authModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:999;
">

<div style="
background:#111;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
">

<h3 style="color:#D4AF37;">Cuenta</h3>

<input id="email" placeholder="Email" style="width:100%; margin-bottom:10px;">
<input id="password" type="password" placeholder="Password" style="width:100%; margin-bottom:10px;">

<button onclick="loginFromUI()" style="width:100%; margin-bottom:10px;">Login</button>
<button onclick="signupFromUI()" style="width:100%; margin-bottom:10px;">Sign up</button>
<button onclick="toggleAuthUI()" style="width:100%;">Cerrar</button>

</div>
</div>

</body>
</html>
