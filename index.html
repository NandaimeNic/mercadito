<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mercadito Nandaime</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#E6C76B;
  font-family:Arial,sans-serif;
}

header{
  background:#000;
  color:#D4AF37;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid rgba(212,175,55,0.3);
}

.sub{
  text-align:center;
  padding:8px;
  font-size:13px;
  color:#bfa14a;
}

.container{
  padding:12px;
  max-width:700px;
  margin:auto;
}

button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid rgba(212,175,55,0.3);
  background:#0A0A0A;
  color:#D4AF37;
  font-size:15px;
}

.publish{
  background:#D4AF37;
  color:#000;
  font-weight:bold;
}

.category-title{
  margin-top:25px;
  font-size:16px;
  font-weight:bold;
  color:#D4AF37;
  border-bottom:1px solid rgba(212,175,55,0.2);
  padding-bottom:5px;
}

.card{
  background:#0A0A0A;
  margin-top:12px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(212,175,55,0.15);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  filter:brightness(0.9);
}

.content{
  padding:10px;
}

.price{
  color:#D4AF37;
  font-weight:bold;
  margin-top:5px;
}

.whatsapp{
  background:#111;
  color:#D4AF37;
}

.form-box{
  display:none;
  background:#0A0A0A;
  padding:12px;
  border-radius:10px;
  margin:12px 0;
  border:1px solid rgba(212,175,55,0.2);
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  background:#000;
  color:#E6C76B;
  border:1px solid rgba(212,175,55,0.2);
}
</style>
</head>

<body>

<header>Mercadito Nandaime</header>

<div class="sub">
Compra y vende en Nandaime
</div>

<div class="container">

<button class="publish" onclick="toggleForm()">Publicar anuncio</button>

<div class="form-box" id="formBox">

<input id="title" placeholder="Título">
<input id="price" placeholder="Precio">

<select id="category">
<option value="ropa">Ropa</option>
<option value="electronica">Electrónica</option>
<option value="reparaciones">Reparaciones</option>
<option value="hogar">Hogar</option>
<option value="vehiculos">Vehículos</option>
<option value="comida">Comida</option>
<option value="servicios">Servicios</option>
<option value="otros">Otros</option>
</select>

<textarea id="desc" placeholder="Descripción"></textarea>
<input id="phone" placeholder="WhatsApp (+505...)">

<button class="publish" onclick="startPayment()">Publicar</button>

</div>

<div id="listings"></div>

</div>

<script src="./main.js" defer></script>

</body>
</html>
