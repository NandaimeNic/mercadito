<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mercadito Nandaime</title>

<link rel="stylesheet" href="/style.css?v=4">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>Mercadito Nandaime</header>

<div class="sub">
Compra y vende en Nandaime
</div>

<div class="container">

<button class="publish" onclick="toggleForm()">Publicar anuncio</button>

<div class="search-box">
  <input placeholder="¿Qué buscas en Nandaime?">
  <button>Buscar</button>
</div>

<div class="form-box" id="formBox">

<input id="title" placeholder="Título">
<input id="price" placeholder="Precio">

<select id="category">
<option value="ropa">👕 Ropa</option>
<option value="electronica">📱 Electrónica</option>
<option value="reparaciones">🔧 Reparaciones</option>
<option value="hogar">🏠 Hogar</option>
<option value="vehiculos">🚗 Vehículos</option>
<option value="comida">🍔 Comida</option>
<option value="servicios">🧰 Servicios</option>
<option value="otros">📦 Otros</option>
</select>

<textarea id="desc" placeholder="Descripción"></textarea>

<input type="file" id="imageInput" accept="image/*">

<input id="phone" placeholder="WhatsApp (+505...)">

<button class="publish" onclick="startPayment()">Publicar</button>

</div>

<div id="listings"></div>

</div>

<div id="detailModal"></div>

<script src="/main.js?v=4" defer></script>

</body>
</html>
